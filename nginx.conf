events {}

http {
    include /etc/nginx/mime.types;

    # Define a rate limit zone for general requests
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # Enable gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Try to serve files directly, fallback to index.html for SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # HTML files — no caching
        
        add_header Cache-Control "no-cache, must-revalidate";

        # Deny access to hidden files and directories
        location ~ /\. {
            deny all;
            return 404;
        }
        
        # Deny access to sensitive files
        location ~* \.(env|git|yml|yaml|config)$ {
            deny all;
            return 404;
    }

        # Fingerprinted assets — cache for 1 year
        location ~* \.(js|css|png|jpg|woff2|mp4)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()";
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self';";
    
        # Rate limiting to prevent abuse
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;
    }
}